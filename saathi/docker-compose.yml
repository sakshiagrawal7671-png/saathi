version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: saathi-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: saathi_root_2024
      MYSQL_DATABASE: saathidb
      MYSQL_USER: saathi
      MYSQL_PASSWORD: saathi_pass_2024
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - saathi-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  backend:
    build: ./backend
    container_name: saathi-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/saathidb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: saathi
      SPRING_DATASOURCE_PASSWORD: saathi_pass_2024
      SAATHI_JWT_SECRET: saathi2024SuperSecretKeyForJWTSigningMustBeAtLeast256BitsLong!
      SAATHI_AI_OPENAI_API_KEY: ${OPENAI_API_KEY:-demo}
      SAATHI_CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:3000,http://localhost:80
    ports:
      - "8080:8080"
    networks:
      - saathi-net

  frontend:
    build: ./frontend
    container_name: saathi-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - saathi-net

volumes:
  mysql_data:

networks:
  saathi-net:
    driver: bridge
