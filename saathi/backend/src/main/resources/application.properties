# Application
spring.application.name=saathi-backend
server.port=8080

# Database - Switched from H2 to PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/saathidb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
# FIXME: Yahan apna actual PgAdmin password daalna mat bhoolna
spring.datasource.password=1234

# JPA / Hibernate Configuration for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Changed from create-drop to update so data remains safe in psql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
saathi.jwt.secret=saathi2024SuperSecretKeyForJWTSigningMustBeAtLeast256BitsLong!
saathi.jwt.expiration=86400000

# CORS
saathi.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# AI API Keys (Replace with real keys)
saathi.ai.openai.api-key=YOUR_OPENAI_API_KEY
saathi.ai.openai.url=https://api.openai.com/v1/chat/completions
saathi.ai.openai.model=gpt-3.5-turbo

# Mail (Optional)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging
logging.level.com.saathi=INFO
logging.level.org.springframework.security=WARN

# Google OAuth2 (replace with real credentials)
spring.security.oauth2.client.registration.google.client-id=528567031833-gkkf8rtqlhksfbbk90o88hunecso6act.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=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
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Firebase (push notifications) - path to service account JSON
saathi.firebase.service-account-path=firebase-service-account.json
saathi.firebase.enabled=false

# Frontend URL (for OAuth redirect)
saathi.frontend.url=http://localhost:3000

